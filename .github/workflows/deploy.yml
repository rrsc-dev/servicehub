name: Pipeline CI/CD Completa

on:
  push:
    branches: [ "main" ]

jobs:
  testes-e-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Configurar PHP 8.5
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          
      - name: Instalar Dependências do Composer
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
        
      - name: Preparar ambiente de testes
        run: |
          cp .env.example .env
          php artisan key:generate
          sed -i 's/DB_CONNECTION=mysql/DB_CONNECTION=sqlite/' .env
          touch database/database.sqlite
          
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Compilar Frontend (Vite)
        run: |
          npm install
          npm run build
          
      - name: Executar Suíte de Testes (PHPUnit)
        run: php artisan test

  deploy-producao:
    needs: testes-e-build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy no Servidor via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # 1. Navega até a pasta do projeto
            cd /home/ubuntu/servicehub
            
            # 2. Atualiza o código do repositório
            git pull origin main
            
            # 3. Sobe/Atualiza a infraestrutura Docker usando o arquivo padrão do Sail
            docker compose up -d --build
            
            # 4. Instala pacotes do Backend (usando o container correto: laravel.test)
            docker compose exec -T laravel.test composer install --optimize-autoloader --no-dev
            
            # 5. Instala pacotes do Frontend e compila o Vue/Inertia
            docker compose exec -T laravel.test npm install
            docker compose exec -T laravel.test npm run build
            
            # 6. Roda as migrations
            docker compose exec -T laravel.test php artisan migrate --force
            
            # 7. Limpa e reconstrói o cache de performance
            docker compose exec -T laravel.test php artisan optimize
            
            # 8. Reinicia os workers da fila
            docker compose exec -T laravel.test php artisan queue:restart