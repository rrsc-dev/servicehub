name: Pipeline CI/CD Completa

on:
  push:
    branches: [ "main" ]

jobs:
  testes-e-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Configurar PHP 8.5
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          
      - name: Instalar Dependências do Composer
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
        
      - name: Preparar ambiente de testes
        run: |
          cp .env.example .env
          php artisan key:generate
          sed -i 's/DB_CONNECTION=mysql/DB_CONNECTION=sqlite/' .env
          touch database/database.sqlite
          
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Compilar Frontend (Vite)
        run: |
          npm install
          npm run build
          
      - name: Executar Suíte de Testes (PHPUnit)
        run: php artisan test

  deploy-producao:
    needs: testes-e-build
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 Deploy no Servidor via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/ubuntu/servicehub
            git pull origin main
            
            # Adicionando sudo para garantir permissão total na execução
            sudo docker compose up -d --build
            
            sudo docker compose exec -T laravel.test composer install --optimize-autoloader --no-dev
            
            sudo docker compose exec -T laravel.test npm install
            sudo docker compose exec -T laravel.test npm run build
            
            sudo docker compose exec -T laravel.test php artisan migrate --force
            sudo docker compose exec -T laravel.test php artisan optimize
            sudo docker compose exec -T laravel.test php artisan queue:restart